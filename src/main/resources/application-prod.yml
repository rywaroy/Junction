server:
  port: 8081

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:junction_prod}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:1}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.junction.entity
  configuration:
    map-underscore-to-camel-case: true

# ==========================================================
# 限流与风控配置（生产环境严格限制）
# ==========================================================
rate-limit:
  ip-limit-per-second: 10
  ip-window-seconds: 1
  user-limit-per-minute: 60
  user-window-seconds: 60
  max-registrations-per-ip-per-hour: 10
  registration-window-seconds: 3600
  auto-cheater-threshold: 20
  rate-limit-count-window-seconds: 3600

internal-api:
  api-key: ${INTERNAL_API_KEY}

wechat:
  mini:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}

oss:
  enabled: ${OSS_ENABLED:true}
  endpoint: ${OSS_ENDPOINT}
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  bucket-name: ${OSS_BUCKET}
  region: ${OSS_REGION}
  role-arn: ${OSS_ROLE_ARN}
  role-session-name: oss-upload-session
  duration-seconds: 3600

logging:
  level:
    root: warn
    com.junction: info
